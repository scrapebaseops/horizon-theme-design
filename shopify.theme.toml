# Shopify CLI theme environments — https://shopify.dev/docs/storefronts/themes/tools/cli/environments
# Run from repo root. Three LLM experiment copies of Horizon; each has its own unpublished theme on the dev store.
# `horizon` = pristine upstream Horizon from https://github.com/Shopify/horizon (local path: horizon-themes/default).

[environments.horizon]
store = "theme-dev-store-2037.myshopify.com"
theme = "159549653250"
path = "horizon-themes/default"

[environments.default]
store = "theme-dev-store-2037.myshopify.com"
theme = "159526027522"
path = "horizon-themes/claude"

[environments.claude]
store = "theme-dev-store-2037.myshopify.com"
theme = "159526027522"
path = "horizon-themes/claude"

[environments.openai]
store = "theme-dev-store-2037.myshopify.com"
theme = "159526519042"
path = "horizon-themes/openai"

[environments.gemini]
store = "theme-dev-store-2037.myshopify.com"
theme = "159526584578"
path = "horizon-themes/gemini"
